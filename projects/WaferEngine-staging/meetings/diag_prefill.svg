<text x="40" y="636" font-size="23" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#c0392b" text-anchor="start">enter_request used to hard-set  current_chunk = 0 ;  it now sets  current_chunk = k.</text>
<text x="40" y="668" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="start">The banks were never cleared — the per-request reset only rewound a counter, so the previous request's chunks were already sitting in SRAM. Nothing moves and there is no</text>
<text x="40" y="692" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="start">inverse transform, which is what makes the reuse nearly free. The one constraint: the shared prefix has to be chunk-aligned, otherwise the boundary chunk must be recomputed.</text>
