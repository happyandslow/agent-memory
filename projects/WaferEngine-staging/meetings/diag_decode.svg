<svg xmlns="http://www.w3.org/2000/svg" width="1706" height="690" viewBox="0 0 1706 690"><defs><marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2c6fb0"/></marker><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c0392b"/></marker></defs><g transform="translate(0,-60)">
<text x="430" y="104" font-size="23" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="start">Round 1 of a two-round request. Both arms must finish in the same place: 768 tokens of context.</text>
<path d="M430.0 130 L430.0 552" stroke="#dce4ea" stroke-width="1"/>
<text x="430.0" y="578" font-size="14" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="middle">0</text>
<path d="M762.8 130 L762.8 552" stroke="#dce4ea" stroke-width="1"/>
<text x="762.8" y="578" font-size="14" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="middle">256</text>
<path d="M1095.6 130 L1095.6 552" stroke="#dce4ea" stroke-width="1"/>
<text x="1095.6" y="578" font-size="14" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="middle">512</text>
<path d="M1428.4 130 L1428.4 552" stroke="#dce4ea" stroke-width="1"/>
<text x="1428.4" y="578" font-size="14" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="middle">768</text>
<text x="929.2" y="602" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="middle">context position</text>
<text x="40" y="205" font-size="23" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#0d1b26" text-anchor="start">Without reuse</text>
<text x="40" y="229" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="start">KV discarded at the</text>
<text x="40" y="249" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="start">round boundary</text>
<rect x="430" y="175" width="332.8" height="112" rx="3" fill="#c2c2c2" fill-opacity="0.55" stroke="#6a7883" stroke-width="1.5"/>
<text x="596.4" y="231.0" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#6a7883" text-anchor="middle">re-prefilled</text>
<text x="596.4" y="253.0" font-size="14" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#6a7883" text-anchor="middle">(not timed)</text>
<rect x="762.8" y="175" width="332.8" height="112" rx="3" fill="#c0392b" fill-opacity="0.3" stroke="#c0392b" stroke-width="1.5"/>
<text x="929.1999999999999" y="231.0" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#c0392b" text-anchor="middle">256 steps DECODED AGAIN</text>
<text x="929.1999999999999" y="253.0" font-size="14" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#c0392b" text-anchor="middle">pure waste</text>
<rect x="1095.6" y="175" width="332.8" height="112" rx="3" fill="#e8b06a" fill-opacity="0.85" stroke="#a86a1e" stroke-width="1.5"/>
<text x="1262.0" y="237.0" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#a86a1e" text-anchor="middle">256 new steps</text>
<text x="1458.4" y="207" font-size="23" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#0d1b26" text-anchor="start">512 decode steps</text>
<text x="1458.4" y="229" font-size="18" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="start">262.9 M cycles</text>
<text x="40" y="415" font-size="23" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#0d1b26" text-anchor="start">With retain</text>
<text x="40" y="439" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="start">KV stays in SRAM</text>
<text x="40" y="459" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="start">across the boundary</text>
<rect x="430" y="385" width="665.6" height="112" rx="3" fill="#84c98a" fill-opacity="0.7" stroke="#155024" stroke-width="1.5"/>
<text x="762.8" y="441.0" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#155024" text-anchor="middle">inherited — 512 tokens of KV kept</text>
<text x="762.8" y="463.0" font-size="14" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#155024" text-anchor="middle">zero work</text>
<rect x="1095.6" y="385" width="332.8" height="112" rx="3" fill="#e8b06a" fill-opacity="0.85" stroke="#a86a1e" stroke-width="1.5"/>
<text x="1262.0" y="447.0" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#a86a1e" text-anchor="middle">256 new steps</text>
<text x="1458.4" y="417" font-size="23" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#0d1b26" text-anchor="start">256 decode steps</text>
<text x="1458.4" y="439" font-size="18" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#155024" text-anchor="start">127.7 M cycles</text>
<text x="1458.4" y="463" font-size="24" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="700" fill="#155024" text-anchor="start">−51.4 %</text>
<text x="40" y="660" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="start">round_reset used to rewind the KV write counter to the fresh prefill length. Retain gates that rewind, continues the position encoding, and recomputes the remaining steps from the retained length.</text>
<text x="40" y="688" font-size="17" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial" font-weight="500" fill="#4a5b66" text-anchor="start">The host stops re-shipping the prefix each round and sends a metadata-only message instead — which meant teaching the transport PEs to accept a message carrying no data at all.</text>
</g></svg>