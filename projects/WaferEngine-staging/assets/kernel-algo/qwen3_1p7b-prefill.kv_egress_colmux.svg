<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="1000" viewBox="0 0 1040 1000" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial">
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c0392b"/></marker><marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2c6fb0"/></marker><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2e8b57"/></marker><marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7a3fb0"/></marker></defs>
<rect width="1040" height="1000" fill="#f7f9fb"/>
<text x="520.0" y="30" font-size="18" font-weight="700" fill="#0d1b26" text-anchor="middle">kv_egress_colmux.csl — KV-cache egress column-mux (NORTH drain to host)</text>
<text x="520.0" y="50" font-size="11.5" font-weight="500" fill="#4a5b66" text-anchor="middle">Each block-row gathers its KV rows EAST; a 1xP_BLOCK_SIZE mux column drains them NORTH to one D2H stream. kv_fwd = transparent W-&gt;E gap extender.</text>
<text x="60" y="84" font-size="13.5" font-weight="700" fill="#0d1b26" text-anchor="start">(1) Spatial layout — EAST-side staircase (2x4 config: 4 block-rows, P_BLOCK_SIZE=8 tall)</text>
<rect x="60" y="124" width="150" height="56" rx="6" fill="#cfe0ee" fill-opacity="1.0" stroke="#245f96" stroke-width="1.4"/>
<text x="135.0" y="144" font-size="11.5" font-weight="700" fill="#0d1b26" text-anchor="middle">block-row 0</text>
<text x="135.0" y="160" font-size="9.5" font-weight="500" fill="#2a4a63" text-anchor="middle">KV slice 16x8</text>
<text x="135.0" y="173" font-size="9" font-weight="600" fill="#c0392b" text-anchor="middle">rows gather EAST -&gt;</text>
<line x1="211" y1="152.0" x2="299" y2="152.0" stroke="#c0392b" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="300" y="124" width="40" height="56" rx="5" fill="#f6d7d2" fill-opacity="1.0" stroke="#c0392b" stroke-width="1.5"/>
<text x="320.0" y="148.0" font-size="9.5" font-weight="700" fill="#7a1f18" text-anchor="middle">col</text>
<text x="320.0" y="161.0" font-size="9.5" font-weight="700" fill="#7a1f18" text-anchor="middle">mux</text>
<line x1="320.0" y1="123" x2="320.0" y2="116" stroke="#2c6fb0" stroke-width="2.4" stroke-dasharray="5 3" marker-end="url(#ab)"/>
<rect x="290.0" y="96" width="60" height="20" rx="4" fill="#cfe3f6" fill-opacity="1.0" stroke="#2c6fb0" stroke-width="1.3"/>
<text x="320.0" y="110" font-size="9.5" font-weight="700" fill="#12356a" text-anchor="middle">D2H 0</text>
<rect x="60" y="198" width="150" height="56" rx="6" fill="#cfe0ee" fill-opacity="1.0" stroke="#245f96" stroke-width="1.4"/>
<text x="135.0" y="218" font-size="11.5" font-weight="700" fill="#0d1b26" text-anchor="middle">block-row 1</text>
<text x="135.0" y="234" font-size="9.5" font-weight="500" fill="#2a4a63" text-anchor="middle">KV slice 16x8</text>
<text x="135.0" y="247" font-size="9" font-weight="600" fill="#c0392b" text-anchor="middle">rows gather EAST -&gt;</text>
<rect x="216" y="215.0" width="216" height="22" rx="4" fill="#efe0c6" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.2"/>
<text x="324.0" y="212.0" font-size="8.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">kv_fwd extender (1 col W-&gt;E)</text>
<line x1="211" y1="226.0" x2="437" y2="226.0" stroke="#c0392b" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="438" y="198" width="40" height="56" rx="5" fill="#f6d7d2" fill-opacity="1.0" stroke="#c0392b" stroke-width="1.5"/>
<text x="458.0" y="222.0" font-size="9.5" font-weight="700" fill="#7a1f18" text-anchor="middle">col</text>
<text x="458.0" y="235.0" font-size="9.5" font-weight="700" fill="#7a1f18" text-anchor="middle">mux</text>
<line x1="458.0" y1="197" x2="458.0" y2="116" stroke="#2c6fb0" stroke-width="2.4" stroke-dasharray="5 3" marker-end="url(#ab)"/>
<rect x="428.0" y="96" width="60" height="20" rx="4" fill="#cfe3f6" fill-opacity="1.0" stroke="#2c6fb0" stroke-width="1.3"/>
<text x="458.0" y="110" font-size="9.5" font-weight="700" fill="#12356a" text-anchor="middle">D2H 1</text>
<rect x="60" y="272" width="150" height="56" rx="6" fill="#cfe0ee" fill-opacity="1.0" stroke="#245f96" stroke-width="1.4"/>
<text x="135.0" y="292" font-size="11.5" font-weight="700" fill="#0d1b26" text-anchor="middle">block-row 2</text>
<text x="135.0" y="308" font-size="9.5" font-weight="500" fill="#2a4a63" text-anchor="middle">KV slice 16x8</text>
<text x="135.0" y="321" font-size="9" font-weight="600" fill="#c0392b" text-anchor="middle">rows gather EAST -&gt;</text>
<rect x="216" y="289.0" width="354" height="22" rx="4" fill="#efe0c6" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.2"/>
<text x="393.0" y="286.0" font-size="8.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">kv_fwd extender (2 col W-&gt;E)</text>
<line x1="211" y1="300.0" x2="575" y2="300.0" stroke="#c0392b" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="576" y="272" width="40" height="56" rx="5" fill="#f6d7d2" fill-opacity="1.0" stroke="#c0392b" stroke-width="1.5"/>
<text x="596.0" y="296.0" font-size="9.5" font-weight="700" fill="#7a1f18" text-anchor="middle">col</text>
<text x="596.0" y="309.0" font-size="9.5" font-weight="700" fill="#7a1f18" text-anchor="middle">mux</text>
<line x1="596.0" y1="271" x2="596.0" y2="116" stroke="#2c6fb0" stroke-width="2.4" stroke-dasharray="5 3" marker-end="url(#ab)"/>
