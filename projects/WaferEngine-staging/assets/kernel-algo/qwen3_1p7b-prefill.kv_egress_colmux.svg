<text x="596.0" y="110" font-size="9.5" font-weight="700" fill="#12356a" text-anchor="middle">D2H 2</text>
<rect x="60" y="346" width="150" height="56" rx="6" fill="#cfe0ee" fill-opacity="1.0" stroke="#245f96" stroke-width="1.4"/>
<text x="135.0" y="366" font-size="11.5" font-weight="700" fill="#0d1b26" text-anchor="middle">block-row 3</text>
<text x="135.0" y="382" font-size="9.5" font-weight="500" fill="#2a4a63" text-anchor="middle">KV slice 16x8</text>
<text x="135.0" y="395" font-size="9" font-weight="600" fill="#c0392b" text-anchor="middle">rows gather EAST -&gt;</text>
<rect x="216" y="363.0" width="492" height="22" rx="4" fill="#efe0c6" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.2"/>
<text x="462.0" y="360.0" font-size="8.5" font-weight="600" fill="#7a5a1e" text-anchor="middle">kv_fwd extender (3 col W-&gt;E)</text>
<line x1="211" y1="374.0" x2="713" y2="374.0" stroke="#c0392b" stroke-width="2.2" marker-end="url(#ar)"/>
<rect x="714" y="346" width="40" height="56" rx="5" fill="#f6d7d2" fill-opacity="1.0" stroke="#c0392b" stroke-width="1.5"/>
<text x="734.0" y="370.0" font-size="9.5" font-weight="700" fill="#7a1f18" text-anchor="middle">col</text>
<text x="734.0" y="383.0" font-size="9.5" font-weight="700" fill="#7a1f18" text-anchor="middle">mux</text>
<line x1="734.0" y1="345" x2="734.0" y2="116" stroke="#2c6fb0" stroke-width="2.4" stroke-dasharray="5 3" marker-end="url(#ab)"/>
<rect x="704.0" y="96" width="60" height="20" rx="4" fill="#cfe3f6" fill-opacity="1.0" stroke="#2c6fb0" stroke-width="1.3"/>
<text x="734.0" y="110" font-size="9.5" font-weight="700" fill="#12356a" text-anchor="middle">D2H 3</text>
<text x="60" y="426" font-size="10.5" font-weight="500" fill="#26333c" text-anchor="start">Drain column = STAIR_X0 + by (staircase): each region gets a clear vertical path NORTH to its own open top-edge host port.</text>
<text x="764" y="368.0" font-size="9.5" font-weight="700" fill="#7a3fb0" text-anchor="start">SOUTH-most col = tail</text>
<text x="764" y="381.0" font-size="9" font-weight="500" fill="#7a3fb0" text-anchor="start">(last to drain -&gt; sources round_sync N)</text>
<line x1="60" y1="450" x2="86" y2="450" stroke="#c0392b" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="94" y="454" font-size="10.5" font-weight="500" fill="#26333c" text-anchor="start">EAST row gather (kv_egress_c id 21, W-&gt;RAMP into mux) — one shared row color across all 4 y-disjoint regions</text>
<line x1="60" y1="470" x2="86" y2="470" stroke="#2c6fb0" stroke-width="2.4" marker-end="url(#ab)"/>
<text x="94" y="474" font-size="10.5" font-weight="500" fill="#26333c" text-anchor="start">NORTH drain to host (out_color {6,8,9,17}, out_q3): RAMP-&gt;N own row, then SWITCH_ADV flips to S-&gt;N for rows below</text>
<line x1="60" y1="490" x2="86" y2="490" stroke="#a86a1e" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="94" y="494" font-size="10.5" font-weight="500" fill="#26333c" text-anchor="start">kv_fwd extender: transparent W-&gt;E pass-through (no program, no queues) bridging the by-column staircase gap</text>
<line x1="60" y1="510" x2="86" y2="510" stroke="#7a3fb0" stroke-width="2.2" marker-end="url(#ap)"/>
<text x="94" y="514" font-size="10.5" font-weight="500" fill="#26333c" text-anchor="start">round_sync (id 10, S-&gt;N): 1-wavelet per-request re-arm barrier; tail sources, middles tap+forward, north sinks</text>
<line x1="40" y1="532" x2="1000" y2="532" stroke="#dce4ea" stroke-width="1.4"/>
<text x="60" y="552" font-size="13.5" font-weight="700" fill="#0d1b26" text-anchor="start">(2) Per-PE task state machine (roles: is_col_tail selects the post-drain branch)</text>
<rect x="60" y="570" width="220" height="62" rx="6" fill="#faddd8" fill-opacity="1.0" stroke="#c0392b" stroke-width="1.6"/><text x="170.0" y="590" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">peel_meta  (task 8)</text><text x="170.0" y="607" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">peel leading request_n_chunks</text><text x="170.0" y="620" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">(1 u32, NOT forwarded) -&gt; drain</text>
<rect x="320" y="570" width="220" height="62" rx="6" fill="#faddd8" fill-opacity="1.0" stroke="#c0392b" stroke-width="1.6"/><text x="430.0" y="590" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">drain  (task 9)</text><text x="430.0" y="607" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">latch n_segs_rt on seg 0;</text><text x="430.0" y="620" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">mov32 seg_len NORTH x n_segs_rt</text><text x="430.0" y="633" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">RAMP-&gt;N own; loop; then post-drain</text>
<line x1="280" y1="601.0" x2="318" y2="601.0" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<path d="M 510 570 L 510 554 L 350 554 L 350 570" fill="none" stroke="#c0392b" stroke-width="1.6" marker-end="url(#ar)"/>
<text x="430.0" y="548" font-size="9" font-weight="600" fill="#c0392b" text-anchor="middle">x n_segs_rt segments</text>
<rect x="60" y="684" width="220" height="62" rx="6" fill="#ece1f6" fill-opacity="1.0" stroke="#7a3fb0" stroke-width="1.6"/><text x="170.0" y="704" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">sync_src  (task 10) — TAIL</text><text x="170.0" y="721" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">source round_sync NORTH;</text><text x="170.0" y="734" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">no SWITCH_ADV (no south row);</text><text x="170.0" y="747" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">self re-arm -&gt; peel_meta</text>
<rect x="360" y="684" width="220" height="62" rx="6" fill="#dbeafe" fill-opacity="1.0" stroke="#245f96" stroke-width="1.6"/><text x="470.0" y="704" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">sync_wait (task 10) — non-tail</text><text x="470.0" y="721" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">SWITCH_ADV out_color (RAMP-&gt;N =&gt; S-&gt;N);</text><text x="470.0" y="734" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">park on round_sync (mov32 recv)</text>
<rect x="620" y="684" width="220" height="62" rx="6" fill="#dbeafe" fill-opacity="1.0" stroke="#245f96" stroke-width="1.6"/><text x="730.0" y="704" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">sync_do (task 11) — non-tail</text><text x="730.0" y="721" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">round_sync arrived (all south drained):</text><text x="730.0" y="734" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">clear switch -&gt; pos0; re-arm -&gt; peel_meta</text>
<path d="M 430.0 632 L 430.0 654 L 160 654 L 160 682" fill="none" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<path d="M 430.0 654 L 460 654 L 460 682" fill="none" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<text x="430.0" y="648" font-size="9.5" font-weight="600" fill="#5a6b76" text-anchor="middle">post-drain: branch on is_col_tail</text>
<text x="160" y="666" font-size="9" font-weight="700" fill="#7a3fb0" text-anchor="middle">tail</text>
<text x="460" y="666" font-size="9" font-weight="700" fill="#245f96" text-anchor="middle">non-tail</text>
<line x1="580" y1="715.0" x2="618" y2="715.0" stroke="#7a3fb0" stroke-width="1.8" marker-end="url(#ap)"/>
<text x="650" y="709.0" font-size="9" font-weight="600" fill="#7a3fb0" text-anchor="middle">round_sync</text>
<path d="M 170.0 746 L 170.0 768 L 30 768 L 30 588 L 58 588" fill="none" stroke="#7a3fb0" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ar)"/>
<path d="M 730.0 746 L 730.0 786 L 20 786 L 20 610 L 58 610" fill="none" stroke="#245f96" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ar)"/>
<text x="300" y="782" font-size="9.5" font-weight="600" fill="#5a6b76" text-anchor="middle">re-arm peel_meta for the next request (per-request serve loop)</text>
<text x="60" y="984" font-size="9.5" font-weight="400" fill="#6a7883" text-anchor="start">Colors/queues: in_color=21 (in_q2, W-&gt;RAMP) - out_color {6,8,9,17} (out_q3, NORTH switch) - round_sync=10 (in_q3/out_q4, S-&gt;N). Count-exactness = correctness; a mis-timed SWITCH_ADV silently hangs.</text>
</svg>