<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="1070" viewBox="0 0 1120 1070" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial">
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c0392b"/></marker><marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2c6fb0"/></marker><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2e8b57"/></marker><marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7a3fb0"/></marker><marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#a86a1e"/></marker></defs>
<rect width="1120" height="1070" fill="#f7f9fb"/>
<text x="560.0" y="30" font-size="17" font-weight="700" fill="#0d1b26" text-anchor="middle">kv_ingress_adaptor.csl — host stream -&gt; injector column relay (1 PE per band)  +  kv_fwd extender</text>
<text x="560.0" y="50" font-size="11.5" font-weight="500" fill="#4a5b66" text-anchor="middle">Cuts one host blob into P_BLOCK_SIZE row-slices, SWITCH_ADV between rows. Working tree of lexu/staging/s6a-inner-pe-kv-route-a: KV_META_LEN 2-&gt;4, n_segs_rt==0 fast-path.</text>
<text x="50" y="86" font-size="13.5" font-weight="700" fill="#0d1b26" text-anchor="start">(1) The per-band ingress chain — host TOP port -&gt; adaptor -&gt; injector column -&gt; kv_fwd -&gt; decode block</text>
<rect x="50" y="172" width="140" height="44" rx="6" fill="#cfe3f6" fill-opacity="1.0" stroke="#2c6fb0" stroke-width="1.5"/>
<text x="120" y="190" font-size="10.5" font-weight="700" fill="#12356a" text-anchor="middle">host H2D stream</text>
<text x="120" y="206" font-size="9" font-weight="500" fill="#12356a" text-anchor="middle">TOP-edge port, band by</text>
<line x1="192" y1="194" x2="238" y2="194" stroke="#2c6fb0" stroke-width="2.4" marker-end="url(#ab)"/>
<rect x="240" y="132" width="220" height="132" rx="6" fill="#e2f0e4" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.6"/><text x="350.0" y="154" font-size="11.5" font-weight="700" fill="#0d1b26" text-anchor="middle">kv_ingress_adaptor  (1x1)</text><text x="350.0" y="174" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">at (STAIR_X0+by, y0-1)</text><text x="350.0" y="188" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">IQ2 &lt;- host_in_color (RAMP)</text><text x="350.0" y="202" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">OQ2 -&gt; inj_out_color (RAMP-&gt;S)</text><text x="350.0" y="216" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">peel u32 #0, re-emit, relay</text><text x="350.0" y="230" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">num_cols-1 metas + KV segs</text><text x="350.0" y="244" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">SWITCH_ADV between rows</text><text x="350.0" y="258" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">buffers ONE u32 (meta0_buf)</text>
<line x1="462" y1="194" x2="508" y2="194" stroke="#2e8b57" stroke-width="2.4" marker-end="url(#ag)"/>
<text x="485" y="182" font-size="8.5" font-weight="700" fill="#1d5c39" text-anchor="middle">SOUTH</text>
<rect x="510" y="132" width="210" height="132" rx="6" fill="#f6d7d2" fill-opacity="1.0" stroke="#c0392b" stroke-width="1.6"/><text x="615.0" y="154" font-size="11.5" font-weight="700" fill="#0d1b26" text-anchor="middle">kv_ingress_injector column</text><text x="615.0" y="174" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">1 col x P_BLOCK_SIZE = 8</text><text x="615.0" y="188" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">at (STAIR_X0+by, y0)</text><text x="615.0" y="202" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">switch pos0 N-&gt;RAMP (take)</text><text x="615.0" y="216" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">pos1 N-&gt;SOUTH (forward)</text><text x="615.0" y="230" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">PE ly takes row-slice ly,</text><text x="615.0" y="244" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">scatters it WEST (OQ3)</text><text x="615.0" y="258" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">round_sync S-&gt;N re-arm</text>
<line x1="732" y1="194" x2="778" y2="194" stroke="#c0392b" stroke-width="2.4" marker-end="url(#ar)"/>
<text x="755" y="182" font-size="8.5" font-weight="700" fill="#7a1f18" text-anchor="middle">WEST</text>
<rect x="780" y="132" width="150" height="132" rx="6" fill="#efe0c6" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.6"/><text x="855.0" y="154" font-size="11.5" font-weight="700" fill="#0d1b26" text-anchor="middle">kv_fwd extender</text><text x="855.0" y="174" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">by cols x 8 at (STAIR_X0, y0)</text><text x="855.0" y="188" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">empty comptime { }</text><text x="855.0" y="202" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">no tasks / queues / memory</text><text x="855.0" y="216" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">painted E-&gt;W on BOTH</text><text x="855.0" y="230" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">switch positions</text><text x="855.0" y="244" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">bridges the staircase gap</text><text x="855.0" y="258" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">(absent when by == 0)</text>
<line x1="932" y1="194" x2="972" y2="194" stroke="#a86a1e" stroke-width="2.4" marker-end="url(#ao)"/>
<rect x="974" y="132" width="96" height="132" rx="6" fill="#cfe0ee" fill-opacity="1.0" stroke="#245f96" stroke-width="1.6"/><text x="1022.0" y="154" font-size="11.5" font-weight="700" fill="#0d1b26" text-anchor="middle">decode block</text><text x="1022.0" y="174" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">16 x 8</text><text x="1022.0" y="188" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">east edge</text><text x="1022.0" y="202" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">kv_ingress</text><text x="1022.0" y="216" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">west-shift</text><text x="1022.0" y="230" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">P-5 chain</text><text x="1022.0" y="244" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">IQ7/OQ7</text><text x="1022.0" y="258" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">peels metas</text>
<text x="50" y="290" font-size="10" font-weight="500" fill="#26333c" text-anchor="start">STAIR_X0 = PLACE_X + Pw + 1. The +by staircase gives each band&#x27;s TOP host port a short, non-degenerate routing rectangle to a top LVDS site (the §7.3 host-stream placer OOM avoidance, kv_fwd.csl:5-9).</text>
<text x="50" y="306" font-size="10" font-weight="500" fill="#26333c" text-anchor="start">NS = P_Y_BLOCK_NUM parallel bands (2 here) =&gt; ~NS x aggregate ingress bandwidth vs the old single SOUTH adaptor+demux that funnelled every band through one port (launch.py:1396-1403).</text>
<text x="50" y="322" font-size="10" font-weight="500" fill="#26333c" text-anchor="start">The adaptor has NO switch and NO barrier: it re-arms on IQ2 backpressure alone (:112-117). Only the injector column needs the round_sync fence, because its switch position is round-carried state.</text>
<line x1="40" y1="338" x2="1080" y2="338" stroke="#dce4ea" stroke-width="1.4"/>
<text x="50" y="360" font-size="13.5" font-weight="700" fill="#0d1b26" text-anchor="start">(2) The per-round meta tile&#x27;s journey — S6a widened KV_META_LEN 2 -&gt; 4  [plen, decode_len, retained_len, pad]</text>
<text x="50" y="396" font-size="10.5" font-weight="700" fill="#26333c" text-anchor="start">row-slice on the wire:</text>
<rect x="200" y="382" width="150" height="44" rx="4" fill="#f6d7d2" fill-opacity="1.0" stroke="#c0392b" stroke-width="1.4"/>
<text x="275.0" y="401" font-size="9" font-weight="600" fill="#12222f" text-anchor="middle">u32 #0</text>
<text x="275.0" y="414" font-size="9" font-weight="600" fill="#12222f" text-anchor="middle">[plen | decode_len]</text>
<rect x="354" y="382" width="150" height="44" rx="4" fill="#fdeecf" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.4"/>
<text x="429.0" y="401" font-size="9" font-weight="600" fill="#12222f" text-anchor="middle">u32 #1</text>
<text x="429.0" y="414" font-size="9" font-weight="600" fill="#12222f" text-anchor="middle">[retained_len | pad]</text>
<rect x="508" y="382" width="300" height="44" rx="4" fill="#e8eef3" fill-opacity="1.0" stroke="#5a6b76" stroke-width="1.4"/>
<text x="658.0" y="401" font-size="9" font-weight="600" fill="#12222f" text-anchor="middle">u32 #2 .. #31  (cols 1..Pw-1, 2 u32 each)</text>
<rect x="812" y="382" width="300" height="44" rx="4" fill="#dbeafe" fill-opacity="1.0" stroke="#245f96" stroke-width="1.4"/>
<text x="962.0" y="401" font-size="9" font-weight="600" fill="#12222f" text-anchor="middle">KV: n_segs_rt x seg_len wavelets</text>
<line x1="275" y1="434" x2="275" y2="452" stroke="#c0392b" stroke-width="2.0" marker-end="url(#ar)"/>
<text x="282" y="456" font-size="9.5" font-weight="600" fill="#7a1f18" text-anchor="start">the ONLY word this PE reads — and only its LOW 16 bits (plen). @as(u16,u32) truncates decode_len away (:69). Then re-emitted (:71): the peel is wavelet-count-neutral.</text>
<text x="200" y="476" font-size="10" font-weight="600" fill="#26333c" text-anchor="start">num_cols = Pw * KV_META_LEN / 2 = 2*Pw = 32 u32   (was Pw = 16 at fcfc8c1)   |   metablk_in/out_dsd extent num_cols-1 : 15 -&gt; 31   |   per-row u32 : Pw + C_kv*plen -&gt; 2*Pw + C_kv*plen</text>
<rect x="50" y="494" width="260" height="46" rx="5" fill="#e2f0e4" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.4"/>
<text x="180" y="521" font-size="10.5" font-weight="700" fill="#12222f" text-anchor="middle">kv_ingress_adaptor (this)</text>
<text x="326" y="513" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">PEELS u32 #0, reads plen only. RE-EMITS it, relays the other 31 metas verbatim (:75).</text>
<text x="326" y="528" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">BLIND to decode_len and retained_len — they are never interpreted on the transport path.</text>
<rect x="50" y="548" width="260" height="46" rx="5" fill="#f6d7d2" fill-opacity="1.0" stroke="#c0392b" stroke-width="1.4"/>
<text x="180" y="575" font-size="10.5" font-weight="700" fill="#12222f" text-anchor="middle">kv_ingress_injector</text>
<text x="326" y="567" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">Same peel, same truncation: n_segs_rt = D_kv * plen (:85). Re-emits (:87), fwds 31 WEST (:91).</text>
<text x="326" y="582" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">Switch held at pos0 for the WHOLE row — peel, both meta ops, every KV segment.</text>
<rect x="50" y="602" width="260" height="46" rx="5" fill="#cfe0ee" fill-opacity="1.0" stroke="#245f96" stroke-width="1.4"/>
<text x="180" y="629" font-size="10.5" font-weight="700" fill="#12222f" text-anchor="middle">decode block PE (west-shift)</text>
<text x="326" y="621" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">First consumer of the wide tile: plen (:1577), decode_len (:1578), retained_len (:1579).</text>
<text x="326" y="636" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">DERIVES retain_rt = (plen == 0) on-device (:1580) — no retain flag is ever transmitted.</text>
<line x1="40" y1="664" x2="1080" y2="664" stroke="#dce4ea" stroke-width="1.4"/>
<text x="50" y="684" font-size="13.5" font-weight="700" fill="#0d1b26" text-anchor="start">(3) Task state machine — per row-slice, x num_rows rows, x rounds</text>
<rect x="50" y="710" width="228" height="68" rx="6" fill="#e2f0e4" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.6"/><text x="164.0" y="729" font-size="11" font-weight="700" fill="#0d1b26" text-anchor="middle">peel_meta0 (task 8)</text><text x="164.0" y="745.0" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">mov32 extent 1: u32 #0 -&gt; meta0_buf</text><text x="164.0" y="757.5" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">:63-65</text>
<rect x="306" y="710" width="228" height="68" rx="6" fill="#e2f0e4" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.6"/><text x="420.0" y="729" font-size="11" font-weight="700" fill="#0d1b26" text-anchor="middle">relay_meta (task 9)</text><text x="420.0" y="745.0" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">n_segs_rt = D_kv * @as(u16,meta0_buf[0])</text><text x="420.0" y="757.5" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">seg_idx=0; re-emit u32 #0 SOUTH</text><text x="420.0" y="770.0" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">:68-72</text>
<rect x="562" y="710" width="228" height="68" rx="6" fill="#e2f0e4" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.6"/><text x="676.0" y="729" font-size="11" font-weight="700" fill="#0d1b26" text-anchor="middle">relay_metablk (task 11)</text><text x="676.0" y="745.0" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">relay remaining num_cols-1 = 31</text><text x="676.0" y="757.5" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">metas in one comptime op   :74-76</text>
<rect x="818" y="710" width="228" height="68" rx="6" fill="#e2f0e4" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.6"/><text x="932.0" y="729" font-size="11" font-weight="700" fill="#0d1b26" text-anchor="middle">relay_kv (task 12)</text><text x="932.0" y="745.0" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">n_segs_rt x mov32(seg_len) SOUTH</text><text x="932.0" y="757.5" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">self-chains per segment   :81-106</text>
<line x1="278" y1="744.0" x2="304" y2="744.0" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="534" y1="744.0" x2="560" y2="744.0" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="790" y1="744.0" x2="816" y2="744.0" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<path d="M 1012 710 L 1012 694 L 852 694 L 852 710" fill="none" stroke="#2e8b57" stroke-width="1.6" marker-end="url(#ag)"/>
<text x="932.0" y="688" font-size="9" font-weight="600" fill="#1d5c39" text-anchor="middle">x n_segs_rt</text>
<rect x="280" y="836" width="228" height="68" rx="6" fill="#dbeafe" fill-opacity="1.0" stroke="#245f96" stroke-width="1.6"/><text x="394.0" y="855" font-size="11" font-weight="700" fill="#0d1b26" text-anchor="middle">advance_switch (task 13)</text><text x="394.0" y="871.0" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">emit 1 CONTROL wavelet on OQ2:</text><text x="394.0" y="883.5" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">SWITCH_ADV -&gt; next injector PE</text><text x="394.0" y="896.0" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">row_idx += 1; -&gt; peel_meta0  :108-110</text>
<rect x="640" y="836" width="228" height="68" rx="6" fill="#ece1f6" fill-opacity="1.0" stroke="#7a3fb0" stroke-width="1.6"/><text x="754.0" y="855" font-size="11" font-weight="700" fill="#0d1b26" text-anchor="middle">rearm (task 10)</text><text x="754.0" y="871.0" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">row_idx = seg_idx = n_segs_rt = 0</text><text x="754.0" y="883.5" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">NO barrier: IQ2 backpressures on the</text><text x="754.0" y="896.0" font-size="9" font-weight="500" fill="#34434d" text-anchor="middle">host port until next round   :112-117</text>
<path d="M 932.0 778 L 932.0 806 L 394 806 L 394 834" fill="none" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<path d="M 932.0 806 L 754 806 L 754 834" fill="none" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<text x="922.0" y="800" font-size="9.5" font-weight="600" fill="#5a6b76" text-anchor="end">row complete: branch on row_idx</text>
<text x="394" y="822" font-size="9" font-weight="700" fill="#245f96" text-anchor="middle">row_idx &lt; num_rows-1</text>
<text x="754" y="822" font-size="9" font-weight="700" fill="#7a3fb0" text-anchor="middle">LAST row (no SWITCH_ADV)</text>
<path d="M 394.0 904 L 394.0 924 L 30 924 L 30 728 L 48 728" fill="none" stroke="#245f96" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ab)"/>
<path d="M 754.0 904 L 754.0 940 L 20 940 L 20 752 L 48 752" fill="none" stroke="#7a3fb0" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ap)"/>
<text x="300" y="920" font-size="9.5" font-weight="600" fill="#245f96" text-anchor="middle">next row-slice</text>
<text x="360" y="936" font-size="9.5" font-weight="600" fill="#7a3fb0" text-anchor="middle">next round&#x27;s blob (backpressure)</text>
<rect x="50" y="956" width="500" height="78" rx="6" fill="#fff2f0" fill-opacity="1.0" stroke="#c0392b" stroke-width="2.0"/>
<text x="60" y="975" font-size="10.5" font-weight="700" fill="#7a1f18" text-anchor="start">S6a FAST-PATH — retain heartbeat (plen == 0 =&gt; n_segs_rt == 0), :82-92</text>
<text x="60" y="992" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">Retain round = META-ONLY: 32 meta u32, ZERO KV. Old code fell into seg_idx+=1; 1&lt;0 false</text>
<text x="60" y="1006" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">-&gt; ONE unconditional seg_len relay -&gt; phantom read + undrained wavelets on the ingress color</text>
<text x="60" y="1020" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">-&gt; round-1 IQ7 remap FATAL (decode.csl:1654 rebinds IQ7/OQ7 to broadcast; must be drained).</text>
<rect x="570" y="956" width="500" height="78" rx="6" fill="#f2f7fb" fill-opacity="1.0" stroke="#245f96" stroke-width="1.6"/>
<text x="580" y="975" font-size="10.5" font-weight="700" fill="#12356a" text-anchor="start">The fast-path reproduces BOTH exits</text>
<text x="580" y="992" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">if last row -&gt; rearm; else -&gt; advance_switch + row_idx += 1. So the column&#x27;s switch still</text>
<text x="580" y="1006" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">walks exactly num_rows-1 positions and the round re-arms exactly once, KV or no KV.</text>
<text x="580" y="1020" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="start">Injector carries the twin (:98-106): both ends compute n_segs_rt = 0 -&gt; count-exact.</text>
<text x="50" y="1056" font-size="9.5" font-weight="400" fill="#6a7883" text-anchor="start">Segmentation is a FABRIC limit, not chunked prefill: seg_len comptime &lt;= 32766 (&gt;= 0x7fff = INFINITE_DSD_LEN hangs silently, §11.7). C_kv = Pw*layers*bsz*kv_cols; D_kv = C_kv/seg_len; n_segs_rt = D_kv*plen, u16-guarded at launch.py:1453.</text>
</svg>