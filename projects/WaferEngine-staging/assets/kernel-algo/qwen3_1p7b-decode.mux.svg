<text x="966.0" y="262" font-size="8.0" font-weight="700" fill="#a86a1e" text-anchor="middle">host_color / OQ2</text>
<text x="966.0" y="289" font-size="7.6" font-weight="500" fill="#a86a1e" text-anchor="middle">RAMP-&gt;EAST</text>
<rect x="110" y="338" width="760" height="60" rx="6" fill="#eef4f9" fill-opacity="1.0" stroke="#245f96" stroke-width="1.2"/>
<text x="490" y="357" font-size="11" font-weight="700" fill="#12222f" text-anchor="middle">per-step blob = wavelets_per_step u32   (ref cfg: N = 8)</text>
<text x="490" y="374" font-size="9.4" font-weight="500" fill="#2a4a63" text-anchor="middle">[ 2 packed-f16 top-K values | 4 i32 top-K indices | 2 i32 sampled token ids | even-pad ]</text>
<text x="490" y="390" font-size="9.4" font-weight="600" fill="#7a3fb0" text-anchor="middle">sampled_off = 6  -&gt;  blob[6] == STOP_TOK (-2) is the early-stop sentinel (G-5, in-band)</text>
<line x1="110" y1="420" x2="136" y2="420" stroke="#2c6fb0" stroke-width="2.2" marker-end="url(#ab)"/>
<text x="144" y="424" font-size="10.6" font-weight="500" fill="#26333c" text-anchor="start">count-exactness: in_port = south_total_with_tsc + kv_hdr (mux CONSUMES the header) · host_port = south_total_with_tsc (header NOT forwarded).</text>
<line x1="40" y1="440" x2="1080" y2="440" stroke="#dce4ea" stroke-width="1.4"/>
<text x="60" y="460" font-size="14" font-weight="700" fill="#0d1b26" text-anchor="start">2  Task state machine  (east-most PE only) — per-STEP inner loop nested inside a per-ROUND outer loop</text>
<rect x="46" y="484" width="178" height="62" rx="6" fill="#fdf0c9" fill-opacity="1.0" stroke="#b08a1e" stroke-width="1.6"/><text x="135.0" y="503" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">init</text><text x="135.0" y="519.0" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">read 1-wavelet budget</text><text x="135.0" y="531.5" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">header N (G-4, blocking)</text><text x="135.0" y="544.0" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">step=0  [KV=1 only]</text>
<rect x="254" y="484" width="178" height="62" rx="6" fill="#dbeafe" fill-opacity="1.0" stroke="#245f96" stroke-width="1.6"/><text x="343.0" y="503" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">main</text><text x="343.0" y="519.0" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">drain blob (N u32)</text><text x="343.0" y="531.5" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">recv_dsd -&gt; blob</text><text x="343.0" y="544.0" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">on in_q = IQ2</text>
<rect x="462" y="484" width="178" height="62" rx="6" fill="#d7efdb" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.6"/><text x="551.0" y="503" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">send</text><text x="551.0" y="519.0" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">forward blob EAST</text><text x="551.0" y="531.5" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">blob -&gt; send_dsd</text><text x="551.0" y="544.0" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">on host_oq = OQ2</text>
<rect x="670" y="484" width="178" height="62" rx="6" fill="#ecdff6" fill-opacity="1.0" stroke="#7a3fb0" stroke-width="1.6"/><text x="759.0" y="503" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">next</text><text x="759.0" y="519.0" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">step++; if STOP_TOK or</text><text x="759.0" y="531.5" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">step &gt;= n_steps_runtime</text><text x="759.0" y="544.0" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">-&gt; tsc_recv, else -&gt; main</text>
<rect x="878" y="484" width="178" height="62" rx="6" fill="#f7e3c8" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.6"/><text x="967.0" y="503" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">tsc_recv / tsc_send</text><text x="967.0" y="519.0" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">drain 8-u32 TSC burst,</text><text x="967.0" y="531.5" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">forward EAST (same queues)</text><text x="967.0" y="544.0" font-size="8.8" font-weight="500" fill="#34434d" text-anchor="middle">KV=1: -&gt; init, KV=0: end</text>
