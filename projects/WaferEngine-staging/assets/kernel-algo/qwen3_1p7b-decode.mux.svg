<text x="560.0" y="68" font-size="11.5" font-weight="500" fill="#4a5b66" text-anchor="middle">ONE blob per decode STEP (unlike prefill&#x27;s one-shot mux); budget header + TSC burst + re-arm are per ROUND (NUM_ROUNDS=3).</text>
