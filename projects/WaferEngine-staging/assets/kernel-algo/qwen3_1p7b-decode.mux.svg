<text x="551.0" y="587" font-size="9.6" font-weight="700" fill="#7a3fb0" text-anchor="middle">PER-STEP loop  (up to n_steps_runtime = N)</text>
<path d="M 967.0 546 L 967.0 608 L 135.0 608 L 135.0 548" fill="none" stroke="#a86a1e" stroke-width="1.8" stroke-dasharray="7 4" marker-end="url(#ao)"/>
<text x="551.0" y="623" font-size="9.6" font-weight="700" fill="#a86a1e" text-anchor="middle">PER-ROUND re-arm (kv_stream_ingress=1): @activate(init) -&gt; park on the next round&#x27;s header  ·  NUM_ROUNDS = 3</text>
<text x="60" y="658" font-size="9.8" font-weight="400" fill="#6a7883" text-anchor="start">Everything rides ONE queue pair (in_q=IQ2 / host_oq=OQ2) in strict FIFO order per round: header, blob x N, TSC burst x 8. No reordering, no credits — backpressure + count-exactness only.</text>
<text x="60" y="676" font-size="9.8" font-weight="500" fill="#a8541e" text-anchor="start">NOTE: launch.py:2251-2260&#x27;s banner still describes an older W-&gt;E cut-through chain emitting full bsz*vocab logits. The shipped code does not do that — one PE, top-K blob.</text>
