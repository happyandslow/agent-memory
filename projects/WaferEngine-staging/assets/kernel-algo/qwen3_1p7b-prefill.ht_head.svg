<text x="104" y="422" font-size="11" font-weight="500" fill="#26333c" text-anchor="start">cyclic-shift ring:vocab tile 绕 HEAD_WIDTH 列转一圈(像 Cannon 的算子移位),就地 LUT 匹配</text>
