<text x="400" y="840" font-size="9.5" font-weight="600" fill="#2e8b57" text-anchor="middle">每个 chunk 重跑 handoff(current_prefill_chunk &lt; request_n_chunks)</text>
<path d="M 730 773.0 L 950 773.0 L 950 537.0 L 56 537.0 L 68 537.0" fill="none" stroke="#a86a1e" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#ar)"/>
<text x="860" y="765.0" font-size="9.5" font-weight="600" fill="#a86a1e" text-anchor="middle">请求完 → 下个请求</text>
<text x="70" y="924" font-size="10" font-weight="400" fill="#6a7883" text-anchor="start">色/队列:tok_bcast=queue3(ingress) · y_send/y_recv=queue2(旋转) · x_src=queue4 / x_dst=queue3(东向拼接)。计数精确=正确性(收发字数必须一致,否则静默挂起)。</text>
