<rect x="530" y="744" width="200" height="58" rx="6" fill="#d7efdb" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.6"/><text x="630.0" y="764" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">handoff_done</text><text x="630.0" y="782" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">chunk++;还有 chunk→forward</text><text x="630.0" y="795" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">请求完→ingress</text>
