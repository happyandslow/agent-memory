<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial">
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c0392b"/></marker><marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2c6fb0"/></marker><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2e8b57"/></marker><marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7a3fb0"/></marker><marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#a86a1e"/></marker></defs>
<rect width="1000" height="720" fill="#f7f9fb"/>
<text x="500.0" y="30" font-size="19" font-weight="700" fill="#0d1b26" text-anchor="middle">mux.csl — one-shot logits egress (serialize through one PE)</text>
<text x="500.0" y="50" font-size="11.5" font-weight="500" fill="#4a5b66" text-anchor="middle">The east-most PE drains the sampled-token / top-K blob from the NORTH and forwards it EAST to the host; all other mux PEs are inert. (2x4 config: 4 PEs)</text>
<text x="70" y="86" font-size="14" font-weight="700" fill="#0d1b26" text-anchor="start">1  Spatial layout + collect-and-emit  (mux row = HT_WIDTH_tail x 1, one row SOUTH of HT_tail)</text>
<rect x="150" y="120" width="170" height="42" rx="6" fill="#e8eef2" fill-opacity="0.7" stroke="#9fb0bc" stroke-width="1.2"/>
<text x="235.0" y="138" font-size="10.5" font-weight="600" fill="#12222f" text-anchor="middle">HT_tail col 0</text>
<text x="235.0" y="153" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">lm_head / top-K / sample</text>
<rect x="336" y="120" width="170" height="42" rx="6" fill="#e8eef2" fill-opacity="0.7" stroke="#9fb0bc" stroke-width="1.2"/>
<text x="421.0" y="138" font-size="10.5" font-weight="600" fill="#12222f" text-anchor="middle">HT_tail col 1</text>
<text x="421.0" y="153" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">lm_head / top-K / sample</text>
<rect x="522" y="120" width="170" height="42" rx="6" fill="#e8eef2" fill-opacity="0.7" stroke="#9fb0bc" stroke-width="1.2"/>
<text x="607.0" y="138" font-size="10.5" font-weight="600" fill="#12222f" text-anchor="middle">HT_tail col 2</text>
<text x="607.0" y="153" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">lm_head / top-K / sample</text>
<rect x="708" y="120" width="170" height="42" rx="6" fill="#bfe0c4" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.6"/>
<text x="793.0" y="138" font-size="10.5" font-weight="600" fill="#12222f" text-anchor="middle">HT_tail col 3</text>
<text x="793.0" y="153" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">root-row east-most = emitter</text>
<text x="142" y="141" font-size="10" font-weight="700" fill="#2e8b57" text-anchor="end">HT_tail</text>
<rect x="150" y="232" width="170" height="46" rx="6" fill="#eceff1" fill-opacity="0.55" stroke="#b7c2cb" stroke-width="1.1"/>
<text x="235.0" y="259" font-size="10" font-weight="600" fill="#8a97a1" text-anchor="middle">inert</text>
<rect x="336" y="232" width="170" height="46" rx="6" fill="#eceff1" fill-opacity="0.55" stroke="#b7c2cb" stroke-width="1.1"/>
<text x="421.0" y="259" font-size="10" font-weight="600" fill="#8a97a1" text-anchor="middle">inert</text>
<rect x="522" y="232" width="170" height="46" rx="6" fill="#eceff1" fill-opacity="0.55" stroke="#b7c2cb" stroke-width="1.1"/>
<text x="607.0" y="259" font-size="10" font-weight="600" fill="#8a97a1" text-anchor="middle">inert</text>
<rect x="708" y="232" width="170" height="46" rx="6" fill="#e8b06a" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.6"/>
<text x="793.0" y="251" font-size="11" font-weight="700" fill="#0d1b26" text-anchor="middle">mux PE (east-most)</text>
<text x="793.0" y="267" font-size="9" font-weight="600" fill="#5a3d10" text-anchor="middle">is_last_pe=1  (only active)</text>
<text x="142" y="255" font-size="10" font-weight="700" fill="#a86a1e" text-anchor="end">mux</text>
<line x1="793.0" y1="162" x2="793.0" y2="230" stroke="#c0392b" stroke-width="2.8" marker-end="url(#ar)"/>
<text x="801.0" y="191.0" font-size="9.5" font-weight="600" fill="#c0392b" text-anchor="start">in_color: blob S down east col</text>
<text x="801.0" y="205.0" font-size="8.5" font-weight="500" fill="#c0392b" text-anchor="start">NORTH -&gt; RAMP</text>
<rect x="948" y="232" width="80" height="46" rx="6" fill="#f0d9b5" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.6"/>
<text x="988" y="259" font-size="11" font-weight="700" fill="#7a4d10" text-anchor="middle">host</text>
<line x1="879" y1="255" x2="946" y2="255" stroke="#a86a1e" stroke-width="2.8" marker-end="url(#ao)"/>
<text x="913.0" y="247" font-size="8.5" font-weight="700" fill="#a86a1e" text-anchor="middle">host_color</text>
<text x="913.0" y="272" font-size="8" font-weight="500" fill="#a86a1e" text-anchor="middle">RAMP-&gt;EAST</text>
<rect x="150" y="324" width="700" height="54" rx="6" fill="#eef4f9" fill-opacity="1.0" stroke="#245f96" stroke-width="1.2"/>
<text x="500" y="344" font-size="11" font-weight="700" fill="#12222f" text-anchor="middle">one-shot blob = wavelets_per_step u32  (2x4: N=32)</text>
<text x="500" y="362" font-size="9.5" font-weight="500" fill="#2a4a63" text-anchor="middle">TOP_K*bsz packed-f16 values  +  TOP_K*bsz i32 indices  +  bsz sampled token  (+ even-pad)</text>
<line x1="150" y1="396" x2="176" y2="396" stroke="#7a3fb0" stroke-width="2.2" marker-end="url(#ap)"/>
<text x="184" y="400" font-size="11" font-weight="500" fill="#26333c" text-anchor="start">TSC tail-relay: after the blob, drain one 8-u32 TSC burst piggybacked from the north and forward it EAST (reuses in_q / host_oq).</text>
<line x1="150" y1="418" x2="176" y2="418" stroke="#c0392b" stroke-width="2.2" marker-end="url(#ar)"/>
<text x="184" y="422" font-size="11" font-weight="500" fill="#26333c" text-anchor="start">Gate-1 escape #2: no keyed gather of the scattered result — one PE serializes it. Count-exact (N, then 8) both ways.</text>
<line x1="40" y1="444" x2="960" y2="444" stroke="#dce4ea" stroke-width="1.4"/>
<text x="70" y="464" font-size="14" font-weight="700" fill="#0d1b26" text-anchor="start">2  Task state machine  (east-most PE only; drain -&gt; forward -&gt; TSC relay -&gt; re-park)</text>
<rect x="60" y="486" width="196" height="58" rx="6" fill="#dbeafe" fill-opacity="1.0" stroke="#245f96" stroke-width="1.6"/><text x="158.0" y="506" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">main</text><text x="158.0" y="523" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">drain blob (N u32)</text><text x="158.0" y="536" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">recv_dsd -&gt; blob (in_q)</text>
<rect x="300" y="486" width="196" height="58" rx="6" fill="#d7efdb" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.6"/><text x="398.0" y="506" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">send</text><text x="398.0" y="523" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">forward blob EAST</text><text x="398.0" y="536" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">blob -&gt; send_dsd (host_oq)</text>
<rect x="540" y="486" width="196" height="58" rx="6" fill="#ecdff6" fill-opacity="1.0" stroke="#7a3fb0" stroke-width="1.6"/><text x="638.0" y="506" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">tsc_recv</text><text x="638.0" y="523" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">drain 8-u32 TSC burst</text><text x="638.0" y="536" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">tsc_recv_dsd (in_q)</text>
<rect x="780" y="486" width="196" height="58" rx="6" fill="#f7e3c8" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.6"/><text x="878.0" y="506" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">tsc_send</text><text x="878.0" y="523" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">forward TSC EAST to host</text><text x="878.0" y="536" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">then re-park main</text>
<line x1="256" y1="515.0" x2="298" y2="515.0" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="496" y1="515.0" x2="538" y2="515.0" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="736" y1="515.0" x2="778" y2="515.0" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<path d="M 878.0 544 L 878.0 570 L 158.0 570 L 158.0 546" fill="none" stroke="#a86a1e" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#ao)"/>
<text x="518.0" y="586" font-size="9.5" font-weight="600" fill="#a86a1e" text-anchor="middle">per-request re-arm: @activate(main) for the next request</text>
<text x="70" y="706" font-size="10" font-weight="400" fill="#6a7883" text-anchor="start">colors/queues:  in_color -&gt; in_q=iq2 (NORTH-&gt;RAMP) · host_color -&gt; host_oq=oq2 (RAMP-&gt;EAST).  Blob + TSC burst reuse the SAME queue pair, drained in FIFO order.  Count mismatch = silent hang.</text>
</svg>