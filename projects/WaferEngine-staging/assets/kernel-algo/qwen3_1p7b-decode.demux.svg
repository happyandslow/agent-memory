<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1120" viewBox="0 0 1200 1120" font-family="ui-sans-serif,Segoe UI,Helvetica,Arial">
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#c0392b"/></marker><marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2c6fb0"/></marker><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#2e8b57"/></marker><marker id="ap" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#7a3fb0"/></marker><marker id="ao" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#a86a1e"/></marker></defs>
<rect width="1200" height="1120" fill="#f7f9fb"/>
<text x="600.0" y="30" font-size="19" font-weight="700" fill="#0d1b26" text-anchor="middle">decode demux.csl — host X[0] seed ingress: 1xP COLUMN peel + EAST fan-out</text>
<text x="600.0" y="50" font-size="11.5" font-weight="500" fill="#4a5b66" text-anchor="middle">Prefill&#x27;s demux turned on its side: a COLUMN chaining N-&gt;S, emitting EAST, carrying a host-PRE-EMBEDDED hidden seed once per round — not token ids every chunk.</text>
<text x="600.0" y="68" font-size="11" font-weight="500" fill="#6a7883" text-anchor="middle">ref config test_sim_2x2block_kv_varlen.json:  P_BLOCK_SIZE=8 PEs, OWN_B = bsz*dim_per_pe/2 = 8 u32 (= 2 lanes x 8 fp16, packed 2/u32), host sends 8 x 8 = 64 u32 per round</text>
<text x="60" y="104" font-size="14" font-weight="700" fill="#0d1b26" text-anchor="start">1  Spatial layout + three moves   (demux = 1 col x P_BLOCK_SIZE rows at fabric_x=2, one col WEST of the HT band)</text>
<rect x="70" y="196" width="130" height="62" rx="6" fill="#f0d9b5" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.6"/>
<text x="135" y="218" font-size="12" font-weight="700" fill="#7a4d10" text-anchor="middle">host</text>
<text x="135" y="234" font-size="9.5" font-weight="500" fill="#7a4d10" text-anchor="middle">X[0] seed, fp16</text>
<text x="135" y="248" font-size="9.5" font-weight="500" fill="#7a4d10" text-anchor="middle">embedded in numpy</text>
<rect x="300" y="196" width="210" height="56" rx="5" fill="#e8b06a" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.5"/>
<text x="405.0" y="214" font-size="10.5" font-weight="700" fill="#0d1b26" text-anchor="middle">demux PE  my_idx=0</text>
<text x="405.0" y="229" font-size="9" font-weight="500" fill="#12222f" text-anchor="middle">peel OWN_B=8 u32</text>
<text x="405.0" y="243" font-size="8.5" font-weight="500" fill="#5a3d10" text-anchor="middle">forward 56 u32 SOUTH</text>
<rect x="300" y="258" width="210" height="56" rx="5" fill="#e8b06a" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.5"/>
<text x="405.0" y="276" font-size="10.5" font-weight="700" fill="#0d1b26" text-anchor="middle">demux PE  my_idx=1</text>
<text x="405.0" y="291" font-size="9" font-weight="500" fill="#12222f" text-anchor="middle">peel OWN_B=8 u32</text>
<text x="405.0" y="305" font-size="8.5" font-weight="500" fill="#5a3d10" text-anchor="middle">forward 48 u32 SOUTH</text>
<rect x="300" y="320" width="210" height="56" rx="5" fill="#e8b06a" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.5"/>
<text x="405.0" y="338" font-size="10.5" font-weight="700" fill="#0d1b26" text-anchor="middle">demux PE  my_idx=2</text>
<text x="405.0" y="353" font-size="9" font-weight="500" fill="#12222f" text-anchor="middle">peel OWN_B=8 u32</text>
<text x="405.0" y="367" font-size="8.5" font-weight="500" fill="#5a3d10" text-anchor="middle">forward 40 u32 SOUTH</text>
<rect x="300" y="382" width="210" height="56" rx="5" fill="#e8b06a" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.5"/>
<text x="405.0" y="400" font-size="10.5" font-weight="700" fill="#0d1b26" text-anchor="middle">demux PE  my_idx=3</text>
<text x="405.0" y="415" font-size="9" font-weight="500" fill="#12222f" text-anchor="middle">peel OWN_B=8 u32</text>
<text x="405.0" y="429" font-size="8.5" font-weight="500" fill="#5a3d10" text-anchor="middle">forward 32 u32 SOUTH</text>
<rect x="300" y="444" width="210" height="56" rx="5" fill="#e8b06a" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.5"/>
<text x="405.0" y="462" font-size="10.5" font-weight="700" fill="#0d1b26" text-anchor="middle">demux PE  my_idx=4</text>
<text x="405.0" y="477" font-size="9" font-weight="500" fill="#12222f" text-anchor="middle">peel OWN_B=8 u32</text>
<text x="405.0" y="491" font-size="8.5" font-weight="500" fill="#5a3d10" text-anchor="middle">forward 24 u32 SOUTH</text>
<rect x="300" y="506" width="210" height="56" rx="5" fill="#e8b06a" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.5"/>
<text x="405.0" y="524" font-size="10.5" font-weight="700" fill="#0d1b26" text-anchor="middle">demux PE  my_idx=5</text>
<text x="405.0" y="539" font-size="9" font-weight="500" fill="#12222f" text-anchor="middle">peel OWN_B=8 u32</text>
<text x="405.0" y="553" font-size="8.5" font-weight="500" fill="#5a3d10" text-anchor="middle">forward 16 u32 SOUTH</text>
<rect x="300" y="568" width="210" height="56" rx="5" fill="#e8b06a" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.5"/>
<text x="405.0" y="586" font-size="10.5" font-weight="700" fill="#0d1b26" text-anchor="middle">demux PE  my_idx=6</text>
<text x="405.0" y="601" font-size="9" font-weight="500" fill="#12222f" text-anchor="middle">peel OWN_B=8 u32</text>
<text x="405.0" y="615" font-size="8.5" font-weight="500" fill="#5a3d10" text-anchor="middle">forward 8 u32 SOUTH</text>
<rect x="300" y="630" width="210" height="56" rx="5" fill="#e8b06a" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.5"/>
<text x="405.0" y="648" font-size="10.5" font-weight="700" fill="#0d1b26" text-anchor="middle">demux PE  my_idx=7  (last)</text>
<text x="405.0" y="663" font-size="9" font-weight="500" fill="#12222f" text-anchor="middle">peel OWN_B=8 u32</text>
<text x="405.0" y="677" font-size="8.5" font-weight="500" fill="#5a3d10" text-anchor="middle">no forward (stub)</text>
<text x="405.0" y="142" font-size="9.5" font-weight="700" fill="#a86a1e" text-anchor="middle">src_q = iq2 (shared by both fabin DSDs -&gt; G-2 FIFO peel)</text>
<path d="M 200 227 L 260 227 L 260 162 L 405.0 162 L 405.0 194" fill="none" stroke="#a86a1e" stroke-width="2.4" marker-end="url(#ao)"/>
<text x="254" y="218" font-size="9.5" font-weight="600" fill="#a86a1e" text-anchor="end">in_color, Edge.TOP</text>
<line x1="358.8" y1="253" x2="358.8" y2="256" stroke="#c0392b" stroke-width="2.6" marker-end="url(#ar)"/>
<text x="294" y="259.0" font-size="8.5" font-weight="700" fill="#c0392b" text-anchor="end">chain_a  hop 0</text>
<line x1="358.8" y1="315" x2="358.8" y2="318" stroke="#2c6fb0" stroke-width="2.6" marker-end="url(#ab)"/>
<text x="294" y="321.0" font-size="8.5" font-weight="700" fill="#2c6fb0" text-anchor="end">chain_b  hop 1</text>
<line x1="358.8" y1="377" x2="358.8" y2="380" stroke="#c0392b" stroke-width="2.6" marker-end="url(#ar)"/>
<text x="294" y="383.0" font-size="8.5" font-weight="700" fill="#c0392b" text-anchor="end">chain_a  hop 2</text>
<line x1="358.8" y1="439" x2="358.8" y2="442" stroke="#2c6fb0" stroke-width="2.6" marker-end="url(#ab)"/>
<text x="294" y="445.0" font-size="8.5" font-weight="700" fill="#2c6fb0" text-anchor="end">chain_b  hop 3</text>
<line x1="358.8" y1="501" x2="358.8" y2="504" stroke="#c0392b" stroke-width="2.6" marker-end="url(#ar)"/>
<text x="294" y="507.0" font-size="8.5" font-weight="700" fill="#c0392b" text-anchor="end">chain_a  hop 4</text>
<line x1="358.8" y1="563" x2="358.8" y2="566" stroke="#2c6fb0" stroke-width="2.6" marker-end="url(#ab)"/>
<text x="294" y="569.0" font-size="8.5" font-weight="700" fill="#2c6fb0" text-anchor="end">chain_b  hop 5</text>
<line x1="358.8" y1="625" x2="358.8" y2="628" stroke="#c0392b" stroke-width="2.6" marker-end="url(#ar)"/>
<text x="294" y="631.0" font-size="8.5" font-weight="700" fill="#c0392b" text-anchor="end">chain_a  hop 6</text>
<rect x="660" y="196" width="190" height="490" rx="6" fill="#8fbfe0" fill-opacity="0.85" stroke="#245f96" stroke-width="1.6"/>
<text x="755" y="182" font-size="11" font-weight="700" fill="#245f96" text-anchor="middle">HT_head band  (6 cols x 8 rows)</text>
<line x1="512" y1="222" x2="658" y2="222" stroke="#2e8b57" stroke-width="2.0" marker-end="url(#ag)"/>
<text x="755" y="240" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">row py=0: C1 runs EAST, dies at diag col 2</text>
<line x1="512" y1="284" x2="658" y2="284" stroke="#2e8b57" stroke-width="2.0" marker-end="url(#ag)"/>
<text x="755" y="302" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">row py=1: C1 runs EAST, dies at diag col 2</text>
<line x1="512" y1="346" x2="658" y2="346" stroke="#2e8b57" stroke-width="2.0" marker-end="url(#ag)"/>
<text x="755" y="364" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">row py=2: C1 runs EAST, dies at diag col 3</text>
<line x1="512" y1="408" x2="658" y2="408" stroke="#2e8b57" stroke-width="2.0" marker-end="url(#ag)"/>
<text x="755" y="426" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">row py=3: C1 runs EAST, dies at diag col 3</text>
<line x1="512" y1="470" x2="658" y2="470" stroke="#2e8b57" stroke-width="2.0" marker-end="url(#ag)"/>
<text x="755" y="488" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">row py=4: C1 runs EAST, dies at diag col 4</text>
<line x1="512" y1="532" x2="658" y2="532" stroke="#2e8b57" stroke-width="2.0" marker-end="url(#ag)"/>
<text x="755" y="550" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">row py=5: C1 runs EAST, dies at diag col 4</text>
<line x1="512" y1="594" x2="658" y2="594" stroke="#2e8b57" stroke-width="2.0" marker-end="url(#ag)"/>
<text x="755" y="612" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">row py=6: C1 runs EAST, dies at diag col 5</text>
