<text x="755" y="674" font-size="8.5" font-weight="500" fill="#2a4a63" text-anchor="middle">row py=7: C1 runs EAST, dies at diag col 5</text>
<text x="585.0" y="162" font-size="9.5" font-weight="700" fill="#2e8b57" text-anchor="middle">out_color = pre_embed_x_color (id 18), RAMP-&gt;EAST</text>
<path d="M 660 674 L 514 674" fill="none" stroke="#7a3fb0" stroke-width="2.2" stroke-dasharray="5 3" marker-end="url(#ap)"/>
<text x="60" y="702" font-size="10.5" font-weight="600" fill="#7a3fb0" text-anchor="start">ht_ready (id 0), EAST -&gt; WEST, 1 wavelet per row: HT_head&#x27;s col-0 PE fires it at the end of ITS init(), after painting C1&#x27;s per-row route. demux init() parks on it and only then activates main.</text>
<text x="60" y="720" font-size="10.5" font-weight="500" fill="#7a3fb0" text-anchor="start">Why: C1&#x27;s route is painted at RUNTIME by ht_head.csl:264-268, but the demux could otherwise emit at load time. The barrier converts that race into an ordering (bsz=1 configs stall without it).</text>
<line x1="60" y1="748" x2="88" y2="748" stroke="#a86a1e" stroke-width="2.4" marker-end="url(#ao)"/>
<text x="96" y="752" font-size="11" font-weight="500" fill="#26333c" text-anchor="start">host ingress (P-5 store-and-forward head): the whole P*OWN_B stream lands on PE 0 via Edge.TOP; FIFO order down the column is what makes the peel correct.</text>
<line x1="60" y1="770" x2="88" y2="770" stroke="#c0392b" stroke-width="2.4" marker-end="url(#ar)"/>
<text x="96" y="774" font-size="11" font-weight="500" fill="#26333c" text-anchor="start">parity chain (G-1): peel OWN_B locally, stream FWD_EXTENT = (P-1-my_idx)*OWN_B SOUTH on alternating chain_a (even hop) / chain_b (odd) — no adjacent-router color conflict.</text>
<line x1="60" y1="792" x2="88" y2="792" stroke="#2e8b57" stroke-width="2.4" marker-end="url(#ag)"/>
<text x="96" y="796" font-size="11" font-weight="500" fill="#26333c" text-anchor="start">EAST emit (P-6 p2p): each row drops its OWN_B slice into HT_head row py. Unlike prefill, this is NOT picked up by a multicast — it is a plain run that terminates at one diag PE.</text>
<line x1="40" y1="820" x2="1160" y2="820" stroke="#dce4ea" stroke-width="1.4"/>
<text x="60" y="840" font-size="14" font-weight="700" fill="#0d1b26" text-anchor="start">2  Task state machine  (same program on every row; my_idx picks the peel offset and FWD_EXTENT)</text>
<rect x="60" y="860" width="240" height="80" rx="6" fill="#ebdcf7" fill-opacity="1.0" stroke="#7a3fb0" stroke-width="1.6"/><text x="180.0" y="880" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">init  (:104)</text><text x="180.0" y="897" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">async @mov32 of 1 ready wavelet</text><text x="180.0" y="910" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">from HT_head col 0</text><text x="180.0" y="923" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">.activate = main</text>
<rect x="350" y="860" width="240" height="80" rx="6" fill="#f7e3c8" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.6"/><text x="470.0" y="880" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">main  (:109)</text><text x="470.0" y="897" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">@mov32 OWN_B from src_q -&gt; own_buf</text><text x="470.0" y="910" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">branch on is_last_pe</text>
<rect x="650" y="860" width="240" height="80" rx="6" fill="#faddd8" fill-opacity="1.0" stroke="#c0392b" stroke-width="1.6"/><text x="770.0" y="880" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">forward_and_out  (:127)</text><text x="770.0" y="897" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">2 async ops:</text><text x="770.0" y="910" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">fwd FWD_EXTENT SOUTH (.unblock)</text><text x="770.0" y="923" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">emit own_buf EAST (.activate)</text>
<rect x="940" y="860" width="200" height="80" rx="6" fill="#d7efdb" fill-opacity="1.0" stroke="#2e8b57" stroke-width="1.6"/><text x="1040.0" y="880" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">send_out  (:122)</text><text x="1040.0" y="897" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">last PE only:</text><text x="1040.0" y="910" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">no south forward</text><text x="1040.0" y="923" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">emit own_buf EAST</text>
<line x1="300" y1="900.0" x2="348" y2="900.0" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<line x1="590" y1="900.0" x2="648" y2="900.0" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<text x="620.0" y="894.0" font-size="9" font-weight="600" fill="#5a6b76" text-anchor="middle">my_idx &lt; P-1</text>
<path d="M 470.0 940 L 470.0 966 L 1040.0 966 L 1040.0 942" fill="none" stroke="#5a6b76" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#ar)"/>
<text x="705.0" y="982" font-size="9.5" font-weight="600" fill="#5a6b76" text-anchor="middle">my_idx == P-1 (is_last_pe)</text>
<rect x="650" y="1012" width="240" height="70" rx="6" fill="#f7e3c8" fill-opacity="1.0" stroke="#a86a1e" stroke-width="1.6"/><text x="770.0" y="1032" font-size="12" font-weight="700" fill="#0d1b26" text-anchor="middle">next_cycle  (:136)</text><text x="770.0" y="1049" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">join gate for the 2 async ops</text><text x="770.0" y="1062" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">kv_stream_ingress: @block(next_cycle)</text><text x="770.0" y="1075" font-size="9.5" font-weight="500" fill="#34434d" text-anchor="middle">+ @activate(main) for the next round</text>
<path d="M 770.0 940 L 770.0 1010" fill="none" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<path d="M 1040.0 940 L 1040.0 1047.0 L 892 1047.0" fill="none" stroke="#5a6b76" stroke-width="1.8" marker-end="url(#ar)"/>
<path d="M 650 1047.0 L 470.0 1047.0 L 470.0 942" fill="none" stroke="#a86a1e" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#ao)"/>
<text x="470.0" y="1065.0" font-size="9.5" font-weight="600" fill="#a86a1e" text-anchor="middle">per-round re-arm (KV_TRANSFER=1); KV_TRANSFER=0 -&gt; idle after one shot</text>
<text x="60" y="1106" font-size="10" font-weight="400" fill="#6a7883" text-anchor="start">colors/queues:  in_color / chain_color_a / chain_color_b -&gt; src_q=iq2 · forward_oq=oq2 · out_color = pre_embed_x_color(id 18) = oq3 · ht_ready_color(id 0) = ready_iq=iq3.   Count-exactness (OWN_B + FWD_EXTENT) = correctness.</text>
</svg>