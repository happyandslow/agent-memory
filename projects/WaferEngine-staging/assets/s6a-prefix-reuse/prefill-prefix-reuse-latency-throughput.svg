<text x="50" y="42" font-size="22" font-weight="700" fill="#0d1b26" text-anchor="start">Prefill prefix reuse on WSE-3 — measured device results</text>
<text x="50" y="68" font-size="13" font-weight="500" fill="#4a5b66" text-anchor="start">524,288 PEs (Pw 512 x Ph 1024), 28 layers, dim 2048, vocab 151,936. Pure on-device single-request latency: host stream preparation and logit post-processing are outside the timed window.</text>
<text x="50" y="88" font-size="13" font-weight="500" fill="#4a5b66" text-anchor="start">n = 1 run per point, no repeats — variance uncharacterised. Every reuse point verified BYTE-IDENTICAL to its cold round.</text>
