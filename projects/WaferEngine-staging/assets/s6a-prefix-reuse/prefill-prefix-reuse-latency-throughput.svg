<text x="1110" y="620" font-size="13" font-weight="700" fill="#12356a" text-anchor="start">Fraction sets the saving; length is a second-order effect.</text>
<text x="1110" y="638" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">Saving  L=8192 vs 16384:  25% -> 7.7/7.3,  50% -> 22.8/23.8,</text>
<text x="1110" y="655" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">75% -> 45.2/49.8.  The gap grows with reuse and favours</text>
<text x="1110" y="672" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">the LONGER prompt — its skipped chunks are the pricier ones.</text>
<text x="96" y="613" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">Reuse is strongly sub-linear: half the prompt cached</text>
<text x="96" y="630" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">buys well under a quarter of the time. A chunk's cost</text>
<text x="96" y="647" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">grows with the text before it, so the reused prefix is</text>
<text x="96" y="664" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">always the cheapest part of the request.</text>
<text x="596" y="613" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">Both prompt lengths now measured at all four reuse</text>
<text x="596" y="630" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">fractions (0 / 25 / 50 / 75%), 524,288 PEs, n=1 each.</text>
<text x="596" y="647" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">Decode side (not shown): retain saves -49.3% at</text>
<text x="596" y="664" font-size="12.5" font-weight="500" fill="#4a5b66" text-anchor="start">MAX_SEQ 4096, -34.6% at 1024 — set by the redo pattern.</text>
</svg>